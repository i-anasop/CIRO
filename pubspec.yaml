name: ciro
description: "CIRO — Crisis Intelligence & Response Orchestrator. A mobile-first agentic AI crisis response prototype."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  intl: ^0.20.2
  # Real Mode infrastructure
  flutter_dotenv: ^5.2.1       # Secure .env loading
  http: ^1.2.2                  # HTTP calls for all external APIs
  geolocator: ^13.0.2           # GPS location (Android/iOS/Web)
  permission_handler: ^11.3.1   # Android permission dialogs
  flutter_local_notifications: ^21.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  google_maps_flutter: ^2.17.0
  shared_preferences: ^2.5.5
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#ffffff"
    theme_color: "#5A5CE5"

flutter_native_splash:
  color: "#0a0a0f" # Matching CiroColors.bg1
  image: assets/logo.png
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  # Load .env file as an asset (flutter_dotenv requirement)
  assets:
    - .env
    - assets/
